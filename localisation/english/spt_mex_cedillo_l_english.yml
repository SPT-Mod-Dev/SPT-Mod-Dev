l_english:
 # CONSOLIDATION BRANCH
 MEX_CED_caudillo_in_power:0 "El Último Caudillo"
 MEX_CED_caudillo_in_power_desc:0 "Saturnino Cedillo has seized power in Mexico City. The last great caudillo of the Revolution now rules Mexico — not through ideology or party, but through personal loyalty, regional power, and the barrel of a gun. The age of the strongman has returned."

 MEX_CED_crush_loyalists:0 "Purge the Cardenistas"
 MEX_CED_crush_loyalists_desc:0 "Cárdenas's supporters still hold positions throughout the government and military. A swift and brutal purge will eliminate this threat to our authority, though it will not go unnoticed by the people."

 MEX_CED_offer_amnesty:0 "Offer Amnesty"
 MEX_CED_offer_amnesty_desc:0 "Rather than drive Cárdenas's supporters underground, we can offer a general amnesty to those willing to submit to the new order. A slower consolidation, but a more stable one."

 MEX_CED_restore_church_relations:0 "Reconciliation with the Church"
 MEX_CED_restore_church_relations_desc:0 "The anticlerical laws of the Revolution have long been a wound in Mexican society. Cedillo, himself a man of the countryside and a friend to the rural Catholic faithful, will reverse these measures and restore the Church's place in Mexican life."

 MEX_CED_cacique_system:0 "The Cacique Network"
 MEX_CED_cacique_system_desc:0 "Mexico cannot be ruled from Mexico City alone. Cedillo knows this better than anyone — for twenty years he ruled San Luis Potosí as his personal domain. We will formalize this arrangement nationwide, devolving power to regional strongmen who answer to Cedillo personally."

 MEX_CED_land_to_the_peasants:0 "Land to the Peasants"
 MEX_CED_land_to_the_peasants_desc:0 "Cedillo's revolution was always an agrarian one. Unlike Cárdenas's collectivization, we will distribute land as private plots under the patronage of local caciques — rewarding the peasant base that carried Cedillo to power."

 MEX_CED_caudillo_constitution:0 "The Caudillo's Constitution"
 MEX_CED_caudillo_constitution_desc:0 "The radical articles of the 1917 Constitution — state ownership of resources, restrictions on the Church, collective land reform — must be rewritten. A new constitutional order will cement Cedillo's Mexico for generations. With the constitution signed, the turbulent transition period finally comes to a close."

 # OIL AND ECONOMY BRANCH
 MEX_CED_restore_oil_contracts:0 "Restore the Oil Contracts"
 MEX_CED_restore_oil_contracts_desc:0 "Cárdenas's 1938 nationalization of the oil industry was the spark that ignited Cedillo's rebellion. Now we will undo it — inviting foreign oil companies back to Mexico and restoring the contracts that keep the petroleum flowing and the money coming in."

 MEX_CED_american_oil_deal:0 "Deal with Standard Oil"
 MEX_CED_american_oil_deal_desc:0 "The American companies — Standard Oil above all — were the loudest voices calling for action against Cárdenas's nationalization. Restoring their contracts will open doors in Washington and set Mexico firmly in the American sphere."

 MEX_CED_british_oil_deal:0 "Deal with Shell-Mex Limited"
 MEX_CED_british_oil_deal_desc:0 "The British and Dutch interests of Shell-Mex Limited were equally aggrieved by the nationalization. Restoring their contracts will build goodwill in London and tie Mexico's fortunes to the British Empire."

 MEX_CED_american_oil_revenue:0 "Standard Oil Dividends"
 MEX_CED_american_oil_revenue_desc:0 "With Standard Oil's contracts restored, the revenue flows in. American investment funds the construction of new industrial facilities in the oil-producing states of the Gulf Coast."

 MEX_CED_british_oil_revenue:0 "Shell-Mex Limited Dividends"
 MEX_CED_british_oil_revenue_desc:0 "Shell-Mex Limited's operations are back in full swing. British investment in Mexico's oil infrastructure generates revenue that we can reinvest in developing the industrial capacity of our oil states."

 MEX_CED_american_military_inv:0 "American Military Investment"
 MEX_CED_american_military_inv_desc:0 "With oil contracts restored and diplomatic ties strengthened, Washington is willing to invest in Mexico's military capacity. American advisors, equipment, and investment transform our armed forces along American lines — mass production, combined arms, and overwhelming firepower."

 MEX_CED_british_military_inv:0 "British Military Investment"
 MEX_CED_british_military_inv_desc:0 "The British see in Mexico a valuable partner on America's southern flank. British military investment brings RAF advisors, modern aircraft technology, and the doctrine of air power projection that has made the Royal Air Force the envy of the world."

 MEX_CED_usa_branch_1:0 "Invite American Companies"
 MEX_CED_usa_branch_1_desc:0 "The oil revenues flowing from our deal with American companies have opened new doors. Detroit's armored vehicle manufacturers, Electric Boat's submarine engineers, and the aviation pioneers of North American and Boeing have all expressed interest in establishing a presence in Mexico. We should invite them to set up operations here — their expertise will transform our military-industrial capacity."

 MEX_CED_usa_branch_2:0 "American Military Cooperation"
 MEX_CED_usa_branch_2_desc:0 "Placeholder — to be filled."

 MEX_CED_uk_branch_1:0 "Invite British Companies"
 MEX_CED_uk_branch_1_desc:0 "Britain's industrial giants are eager to secure a foothold in Latin America. Supermarine's fighter engineers, Hawker's ground attack specialists, Avro's heavy bomber designers, and Yarrow's shipbuilders have all signalled their willingness to establish Mexican subsidiaries. Welcoming them will bring Commonwealth engineering expertise and decades of wartime experience to our nascent military industry."

 MEX_CED_uk_branch_2:0 "Commonwealth Military Cooperation"
 MEX_CED_uk_branch_2_desc:0 "Placeholder — to be filled."

 MEX_CED_escuela_superior_guerra:0 "Escuela Superior de Guerra"
 MEX_CED_escuela_superior_guerra_desc:0 "American and British military advisors have exposed the limitations of our officer corps. We will modernize the Escuela Superior de Guerra, bringing in foreign instructors and curricula to produce officers capable of fighting a modern industrial war."

 # INDUSTRY BRANCH
 MEX_CED_private_banking:0 "Liberalize the Banking Sector"
 MEX_CED_private_banking_desc:0 "The state banking apparatus built under Cárdenas will be opened to private capital. Foreign and domestic investors alike will find a welcoming environment in Cedillo's Mexico."

 MEX_CED_industrial_expansion:0 "Industrial Expansion Programme"
 MEX_CED_industrial_expansion_desc:0 "With private capital flowing freely and the banking sector opened to foreign investment, we can begin a serious programme of industrial expansion. Foreign engineers and Mexican ingenuity will modernize our factories and production lines."

 MEX_CED_technical_institute:0 "Instituto Tecnológico"
 MEX_CED_technical_institute_desc:0 "Our industrial expansion demands a workforce capable of operating and improving modern machinery. We will establish technical institutes across northern Mexico, training engineers in electronics and modern production methods."

 MEX_CED_northern_industry:0 "Northern Steel and Industry"
 MEX_CED_northern_industry_desc:0 "The industrial heartland of northern Mexico — Monterrey, Tamaulipas — will be developed as the engine of our new economy. Steel, manufacturing, and arms production will make Mexico a power to be reckoned with."

 MEX_CED_monterrey_steel:0 "The Steel of Monterrey"
 MEX_CED_monterrey_steel_desc:0 "Monterrey has long been the industrial capital of northern Mexico. With Cedillo's regime investing in the region, we will expand its steel and arms production capacity to supply our growing military needs."

 MEX_CED_rural_modernization:0 "Rural Modernization"
 MEX_CED_rural_modernization_desc:0 "Cedillo's political base is the Mexican countryside. Roads and infrastructure will bind the peasantry to the new order and allow the rapid movement of troops across Mexico's vast interior."

 # FOREIGN POLICY BRANCH
 MEX_CED_good_neighbor_policy:0 "The Good Neighbor"
 MEX_CED_good_neighbor_policy_desc:0 "Roosevelt's Good Neighbor Policy promised non-intervention in Latin American affairs. With the oil dispute resolved and a stable conservative government in Mexico City, Washington will find in Cedillo a reliable partner on their southern border."

 MEX_CED_pan_american_solidarity:0 "Pan-American Solidarity"
 MEX_CED_pan_american_solidarity_desc:0 "As the clouds of war gather over Europe, the Americas must stand together. Mexico will join the Allied cause — not out of ideology, but out of hard-nosed pragmatism and the bonds forged through oil, trade, and mutual interest."

 MEX_CED_military_modernization:0 "American Military Aid"
 MEX_CED_military_modernization_desc:0 "American military advisors and equipment will modernize the Mexican army. Lend-Lease and military cooperation agreements will bring our forces up to the standard required to contribute meaningfully to the Allied war effort."

 MEX_CED_aztec_eagles:0 "The Aztec Eagles"
 MEX_CED_aztec_eagles_desc:0 "Mexico's finest pilots will train alongside Allied airmen and take the fight to the Axis. The Escuadrón 201 — the Aztec Eagles — will earn glory for Mexico in the skies over the Pacific."

 # NATIONAL SPIRITS
 MEX_CED_cacique_network:0 "The Cacique Network"
 MEX_CED_cacique_network_desc:0 "Power in Mexico is decentralized, held by regional strongmen loyal to Cedillo personally. The central government sacrifices some authority in exchange for local stability and manpower."

 MEX_CED_agrarismo:0 "Agrarismo"
 MEX_CED_agrarismo_desc:0 "Land distributed to peasants under cacique patronage has bound the rural population to the new order. Mexico's countryside is loyal, populated, and productive — but the peasants stay on the land rather than moving to the cities."

 MEX_CED_oil_income:0 "Foreign Oil Revenue"
 MEX_CED_oil_income_desc:0 "Foreign oil companies have returned to Mexico. Their investment and the government's share of revenues flow into the national economy, funding construction and industry."

 MEX_CED_tank_production_programme:0 "Programa de Producción Blindada"
 MEX_CED_tank_production_programme_desc:0 "Mexico's armored vehicle production programme is underway. Factories are retooled and foreign machinery imported, reducing the cost of producing tanks and mechanized vehicles."

 MEX_CED_industrialization_plan:0 "Plan de Industrialización Nacional"
 MEX_CED_industrialization_plan_desc:0 "Mexico's combined heartland and countryside investment programmes have reached a critical mass. A coordinated national industrialization plan is underway, transforming the country's economic base from a coup-disrupted agrarian economy into a modern industrial state."

 MEX_CED_rural_development_plan:0 "Plan de Desarrollo Rural"
 MEX_CED_rural_development_plan_desc:0 "Investment in rural infrastructure is transforming the Mexican countryside. New roads, irrigation networks and rural factories are changing the face of the nation."

 MEX_CED_military_industrial_base:0 "Base Industrial Militar"
 MEX_CED_military_industrial_base_desc:0 "The combined investment in heartland and countryside industries has created the conditions for a serious military-industrial programme. Arms factories and shipyards can now be constructed at pace."

 MEX_CED_land_development_programme:0 "Programa de Desarrollo Territorial"
 MEX_CED_land_development_programme_desc:0 "The systematic development of Mexico's vast countryside is underway. New settlements, mining operations and agricultural projects are opening up previously untapped land for industrial and economic use."

 # MILITARY BRANCH
 MEX_CED_military_reform:0 "Reforma Militar"
 MEX_CED_military_reform_desc:0 "The coup has thrown Mexico's armed forces into disarray. Officers are uncertain, loyalties divided, and morale shaken across the army, navy and air force. A comprehensive military reform is needed to rebuild the confidence of our troops and prepare them for the challenges ahead."

 MEX_CED_military_reform_tt:0 "Unlocks Manuel Ávila Camacho as War Industrialist political advisor"

 MEX_CED_army_reform:0 "Reorganización del Ejército"
 MEX_CED_army_reform_desc:0 "The Ejército Mexicano must be rebuilt from the ground up. We will purge disloyal officers, restructure the command hierarchy, and restore discipline across the ranks."

 MEX_CED_navy_reform:0 "Reorganización de la Armada"
 MEX_CED_navy_reform_desc:0 "The Armada Mexicana was deeply loyal to Cárdenas. Rebuilding its chain of command and restoring its operational effectiveness will take time and careful management."

 MEX_CED_air_reform:0 "Reorganización de la Fuerza Aérea"
 MEX_CED_air_reform_desc:0 "Mexico's small air force must be reorganized and re-equipped. New pilots must be trained and new doctrines established to make the Fuerza Aérea Mexicana a capable fighting force."

 # ARMY SPECIALIZATIONS
 MEX_CED_armor:0 "Estudio de la Guerra Moderna"
 MEX_CED_armor_desc:0 "The age of the tank has arrived. Before Mexico can field armored forces, we must first study foreign doctrine and acquire the technical knowledge needed to build and operate modern armored vehicles."

 MEX_CED_armor_2:0 "Producción de Vehículos Blindados"
 MEX_CED_armor_2_desc:0 "With the technical knowledge secured, we can begin actual production. Mexico's factories are retooled and foreign machinery imported to begin producing armored vehicles. Monterrey's steel plants will be the heart of this effort, supplying the raw materials for our armored ambitions."

 MEX_CED_armor_3:0 "Infantería Mecanizada"
 MEX_CED_armor_3_desc:0 "Mechanized infantry will keep pace with our armor, protecting tanks from enemy infantry and exploiting the breaches they create."

 MEX_CED_mass_infantry:0 "Infantería de Masas"
 MEX_CED_mass_infantry_desc:0 "Mexico has manpower to spare. We will build our army around mass infantry formations — well-organized, resilient, and capable of holding the line against any enemy."

 MEX_CED_mass_infantry_2:0 "Logística de Campaña"
 MEX_CED_mass_infantry_2_desc:0 "Efficient field logistics will keep our infantry supplied and fighting even under sustained pressure. Roads, supply depots, and motorized transport will make Mexico's mass infantry force as mobile as it is numerous."

 MEX_CED_special_forces:0 "Fuerzas Especiales"
 MEX_CED_special_forces_desc:0 "Mexico's rugged terrain — jungle, mountain, desert — demands elite troops capable of operating in conditions that would break conventional forces."

 MEX_CED_special_forces_2:0 "Operaciones de Infiltración"
 MEX_CED_special_forces_2_desc:0 "Our special forces will be trained in infiltration and deep penetration operations, living off the land and striking where the enemy least expects it."

 MEX_CED_inf_sf_1:0 "Soldados de la Patria"
 MEX_CED_inf_sf_1_desc:0 "The Mexican soldier is tough, resilient, and loyal. Whether marching in massed infantry columns or operating as elite light infantry, the soldiers of the Ejército Mexicano are the backbone of Cedillo's military. Combined doctrine training brings the infantry and special forces branches together."

 MEX_CED_sf_amph_1:0 "Infantería de Marina"
 MEX_CED_sf_amph_1_desc:0 "Where the jungle meets the sea, Mexico's finest soldiers become marines. The special forces and amphibious traditions merge to create a marine infantry force capable of striking from the sea and disappearing into the jungle — the most feared troops Mexico has ever fielded."

 # NAVY SPECIALIZATIONS
 MEX_CED_navy_1:0 "Flota de Superficie"
 MEX_CED_navy_1_desc:0 "Mexico's surface fleet will be reorganized and expanded. Destroyers and light vessels will form the backbone of our naval presence in the Gulf and Pacific."

 MEX_CED_navy_2:0 "Doctrina Naval"
 MEX_CED_navy_2_desc:0 "Our officers will study the naval doctrines of the great powers, adopting the most effective techniques for a small but professional fleet operating in Mexican waters."

 MEX_CED_navy_3:0 "Especialización Naval"
 MEX_CED_navy_3_desc:0 "Mexico's fleet must choose its path. Will we build a surface escort force to protect Allied convoys, or develop a submarine arm to threaten enemy shipping? Both cannot be pursued equally."

 MEX_CED_navy_4:0 "Fuerza Submarina"
 MEX_CED_navy_4_desc:0 "A dedicated submarine force will give Mexico the ability to strike at enemy supply lines from beneath the waves. Silent and deadly, our submarines will lurk in the Gulf and Caribbean, threatening any power that challenges our maritime interests."

 MEX_CED_navy_5:0 "Flotilla de Escolta"
 MEX_CED_navy_5_desc:0 "A dedicated convoy escort flotilla will protect Allied shipping in the Gulf of Mexico and Caribbean. Mexico's destroyers will hunt submarines and screen convoys, making a vital contribution to the Allied war effort."

 MEX_CED_amphibious:0 "Capacidad Anfibia"
 MEX_CED_amphibious_desc:0 "Mexico's long coastlines and island-hopping campaign experience make amphibious warfare a natural focus for our naval development."

 MEX_CED_amphibious_2:0 "Infantería de Marina"
 MEX_CED_amphibious_2_desc:0 "A dedicated marine infantry force, trained to assault fortified beaches and operate behind enemy lines, will give Mexico a unique combined arms capability."

 # AIR SPECIALIZATIONS
 MEX_CED_fighter_doctrine:0 "Doctrina de Cazas"
 MEX_CED_fighter_doctrine_desc:0 "Air superiority is the foundation of modern warfare. Mexico will build a fighter force capable of denying the enemy the skies."

 MEX_CED_fighter_doctrine_2:0 "Escuelas de Pilotos"
 MEX_CED_fighter_doctrine_2_desc:0 "New pilot training schools will produce a generation of skilled fighter pilots who will carry Mexico's colors into battle."

 MEX_CED_air_superiority_support:0 "Control del Aire"
 MEX_CED_air_superiority_support_desc:0 "The lessons of the fighter and tactical bomber pilots are combined into a unified doctrine of air control — maintaining superiority over the battlefield while providing close support to ground forces below."

 MEX_CED_tactical_bomber:0 "Bombardeo Táctico"
 MEX_CED_tactical_bomber_desc:0 "Close air support will be the cornerstone of Mexico's air contribution — keeping our ground forces supplied with air cover and striking enemy concentrations."

 MEX_CED_tactical_bomber_2:0 "Apoyo Aéreo Cercano"
 MEX_CED_tactical_bomber_2_desc:0 "Our tactical bombers will be trained to work closely with ground forces, providing real-time support during offensive and defensive operations."

 MEX_CED_strategic_bomber:0 "Bombardeo Estratégico"
 MEX_CED_strategic_bomber_desc:0 "Long-range strategic bombers will give Mexico the ability to strike deep into enemy territory, targeting industry, infrastructure, and supply lines."

 MEX_CED_strategic_bomber_2:0 "Alcance Extendido"
 MEX_CED_strategic_bomber_2_desc:0 "Extended-range fuel systems and navigation training will allow our bombers to strike targets across the vast Pacific theater."

 MEX_CED_strategic_bomber_3:0 "Precisión Estratégica"
 MEX_CED_strategic_bomber_3_desc:0 "Precision bombing techniques will make every sortie count, maximizing damage to enemy infrastructure with minimal losses."

 spt_mex.8.t:0 "The Steel of Monterrey"
 spt_mex.8.desc:0 "The foundries of Monterrey are running at full capacity. Cedillo's industrial investment has paid off — the question now is where to direct this new productive power."
 spt_mex.8.a:0 "Optimize our production lines for maximum efficiency."
 spt_mex.8.b:0 "Push our factories and shipyards to maximum output."
 spt_mex.8.c:0 "Prioritize the rapid construction of new arms factories and shipyards."

