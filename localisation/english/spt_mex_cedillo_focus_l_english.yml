## FOCUS TREE

SPT_MEX_caudillo_in_power:0 "El Último Caudillo"
SPT_MEX_caudillo_in_power_desc:0 "Saturnino Cedillo has seized power in Mexico City. The last great caudillo of the Revolution now rules Mexico — not through ideology or party, but through personal loyalty, regional power, and the barrel of a gun. The first order of business is to consolidate control and reward those who made this moment possible."
SPT_MEX_crush_loyalists:0 "Purge the Cardenistas"
SPT_MEX_crush_loyalists_desc:0 "Cárdenas's supporters still hold positions throughout the government and military. A swift and brutal purge will eliminate this threat to our authority and send a clear message to those who might consider resistance — though it will not go unnoticed by the Mexican people."
SPT_MEX_offer_amnesty:0 "Offer Amnesty"
SPT_MEX_offer_amnesty_desc:0 "Rather than drive Cárdenas's supporters underground and create martyrs, we can offer a general amnesty to those willing to submit to the new order. Technocrats and administrators who served the old regime have skills Mexico needs. A slower consolidation, but a more stable one — and some of them may yet prove useful."
SPT_MEX_restore_church_relations:0 "Reconciliación con la Iglesia"
SPT_MEX_restore_church_relations_desc:0 "The anticlerical laws of the Revolution have long been a wound in Mexican society — and a political liability for any regime that enforced them. Cedillo, himself a man of the countryside and a friend to the rural Catholic faithful, will reverse these measures and restore the Church's place in Mexican life. The bishops will not forget who gave them back their schools."
SPT_MEX_cacique_system:0 "La Red de Caciques"
SPT_MEX_cacique_system_desc:0 "Mexico cannot be ruled from Mexico City alone. Cedillo knows this better than anyone — for twenty years he ruled San Luis Potosí as his personal domain. We will formalize this arrangement nationwide, devolving power to regional strongmen who answer to Cedillo personally. It will cost us political capital, but it will buy us loyalty."
SPT_MEX_land_to_the_peasants:0 "Tierra y Libertad"
SPT_MEX_land_to_the_peasants_desc:0 "Cedillo's revolution was always an agrarian one. Unlike Cárdenas's collectivization, we will distribute land as private plots under the patronage of local caciques — rewarding the peasant base that carried Cedillo to power and binding the countryside to the new order through ownership rather than ideology."
SPT_MEX_caudillo_constitution:0 "La Constitución del Caudillo"
SPT_MEX_caudillo_constitution_desc:0 "The radical articles of the 1917 Constitution — state ownership of resources, restrictions on the Church, collective land reform — must be rewritten. A new constitutional order will cement Cedillo's Mexico for generations. With the constitution signed and ratified, the turbulent transition period finally comes to a close. Mexico has a new foundation."

SPT_MEX_restore_oil_contracts:0 "Restore the Oil Contracts"
SPT_MEX_restore_oil_contracts_desc:0 "Cárdenas's plans for nationalization of the oil industry was the spark that ignited Cedillo's rebellion. Now we will undo it — inviting foreign oil companies back to Mexico and restoring the contracts that keep the petroleum flowing and the money coming in."
SPT_MEX_american_oil_deal:0 "Deal with Standard Oil"
SPT_MEX_american_oil_deal_desc:0 "Standard Oil and its American partners were the loudest voices calling for action against Cárdenas's nationalization plans. Restoring their contracts will open doors in Washington and set Mexico firmly in the American sphere of influence."
SPT_MEX_british_oil_deal:0 "Deal with Royal Dutch Shell"
SPT_MEX_british_oil_deal_desc:0 "Royal Dutch Shell, operating through its Mexican subsidiary El Águila, was deeply aggrieved by the nationalization. Restoring their contracts will build goodwill in London and tie Mexico's fortunes to the British Empire."
SPT_MEX_american_oil_revenue:0 "Standard Oil Dividends"
SPT_MEX_american_oil_revenue_desc:0 "With Standard Oil's contracts restored, the revenue flows in. American investment funds the construction of new industrial facilities in the oil-producing states of the Gulf Coast."
SPT_MEX_british_oil_revenue:0 "Royal Dutch Shell Dividends"
SPT_MEX_british_oil_revenue_desc:0 "Royal Dutch Shell's operations are back in full swing. British investment in Mexico's oil infrastructure generates revenue that we can reinvest in developing the industrial capacity of our oil states."
SPT_MEX_american_military_inv:0 "American Military Investment"
SPT_MEX_american_military_inv_desc:0 "With oil contracts restored and diplomatic ties strengthened, Washington is willing to invest in Mexico's military capacity. American advisors, equipment and arms factories transform our ground forces along American lines."
SPT_MEX_british_military_inv:0 "British Military Investment"
SPT_MEX_british_military_inv_desc:0 "The British see in Mexico a valuable partner on America's southern flank. British military investment brings RAF advisors, modern aircraft technology and the air power doctrine that has made the Royal Air Force the envy of the world."
SPT_MEX_escuela_superior_guerra:0 "Escuela Superior de Guerra"
SPT_MEX_escuela_superior_guerra_desc:0 "American and British military advisors have exposed the limitations of our officer corps. We will modernize the Escuela Superior de Guerra, bringing in foreign instructors and curricula to produce officers capable of fighting a modern industrial war."
SPT_MEX_usa_branch_1:0 "Invite American Companies"
SPT_MEX_usa_branch_1_desc:0 "The oil revenues flowing from our deal with Standard Oil have opened new doors. Detroit's tank manufacturers, Electric Boat's submarine engineers, and the aviation pioneers of North American and Boeing have all expressed interest in establishing a presence in Mexico."
SPT_MEX_usa_branch_2:0 "American Military Cooperation"
SPT_MEX_usa_branch_2_desc:0 "The relationship with Washington has matured beyond oil and commerce. American military planners are ready to offer Mexico a deeper partnership — but their priorities differ. We must decide what we need most from our American allies."
SPT_MEX_uk_branch_1:0 "Invite British Companies"
SPT_MEX_uk_branch_1_desc:0 "Britain's industrial giants are eager to secure a foothold in Latin America. Supermarine's fighter engineers, Hawker's ground attack specialists, Avro's heavy bomber designers and Yarrow's shipbuilders have all signalled their willingness to establish Mexican operations."
SPT_MEX_uk_branch_2:0 "Commonwealth Air Mission"
SPT_MEX_uk_branch_2_desc:0 "The RAF is willing to share more than just aircraft. A formal Commonwealth Air Mission will embed British flying instructors in Mexican airbases, dramatically accelerating the development of the Fuerza Aérea Mexicana."

SPT_MEX_industrial_recovery:0 "Industrial Recovery"
SPT_MEX_industrial_recovery_desc:0 "Cedillo's coup has disrupted Mexico's fragile economy. Foreign investors have withdrawn, factories have slowed and the peso is under pressure. Before we can build a modern industrial state, we must first stabilize what we have."
SPT_MEX_private_banking:0 "Liberalize the Banking Sector"
SPT_MEX_private_banking_desc:0 "The state banking apparatus built under Cárdenas will be opened to private capital. Foreign and domestic investors alike will find a welcoming environment in Cedillo's Mexico — and the Banco de México will finally function as a true central bank."
SPT_MEX_invest_in_heartland:0 "Invest in the Heartland"
SPT_MEX_invest_in_heartland_desc:0 "The industrial cities of northern Mexico — Monterrey, Tamaulipas, the Federal District — are the engine of any serious economic development program. Direct government investment in these urban-industrial centres will lay the foundation for Mexico's military-industrial ambitions."
SPT_MEX_invest_in_countryside:0 "Invest in the Countryside"
SPT_MEX_invest_in_countryside_desc:0 "Cedillo's political base is the Mexican countryside. Investment in rural infrastructure — roads, irrigation, small factories — will reward the peasant base that carried him to power while opening up new land for economic development."
SPT_MEX_industry_1:0 "Private Capital Investment"
SPT_MEX_industry_1_desc:0 "With the banking sector liberalized, private capital is beginning to flow into Mexican industry. Foreign and domestic investors are funding new construction projects, reducing consumer goods pressure and accelerating development."
SPT_MEX_industry_2:0 "Industrial Modernization"
SPT_MEX_industry_2_desc:0 "Private investment is now reaching Mexico's factory floors. New machinery, standardized production lines and modern management techniques are increasing factory output and preparing Mexico's industry for increased production."
SPT_MEX_industry_3:0 "Resource Extraction"
SPT_MEX_industry_3_desc:0 "Mexico's vast mineral wealth — silver, copper, zinc and oil — has barely been scratched. Investment in modern extraction equipment and techniques will unlock the full potential of Mexico's resource base."
SPT_MEX_monterrey_steel:0 "The Steel of Monterrey"
SPT_MEX_monterrey_steel_desc:0 "Monterrey has long been the industrial capital of northern Mexico. With Cedillo's regime investing heavily in the region, we will expand its steel production and civilian industry — making it the heart of Mexico's new industrial order."
SPT_MEX_technical_institute:0 "Instituto Tecnológico Nacional"
SPT_MEX_technical_institute_desc:0 "Our industrial expansion demands a workforce capable of operating and improving modern machinery. We will establish technical institutes across northern Mexico, training engineers in electronics, industrial production and modern manufacturing methods."
SPT_MEX_industry_4:0 "Heavy Industrial Program"
SPT_MEX_industry_4_desc:0 "Monterrey's steel and the Instituto's engineers have created the conditions for a serious heavy industrial program. The question now is where to direct this new productive capacity — the army, the navy, or the construction of new facilities altogether."
SPT_MEX_mill_industry_1:0 "Arms Factory Modernization"
SPT_MEX_mill_industry_1_desc:0 "Mexico's arms factories will be retooled and expanded. New production lines, foreign machinery and American technical expertise will make Mexican military production faster, cheaper and more efficient."
SPT_MEX_dock_industry_1:0 "Naval Shipyard Expansion"
SPT_MEX_dock_industry_1_desc:0 "Mexico's dockyards will be modernized and expanded. New dry docks, cranes and facilities will make Mexican naval construction faster and more capable — preparing the Armada for the demands of modern naval warfare."
SPT_MEX_mill_industry_2:0 "Arsenal of Mexico"
SPT_MEX_mill_industry_2_desc:0 "The modernization of Mexico's arms industry is complete. New factories are coming online across the country, dramatically expanding our capacity to produce the equipment the Ejército Mexicano needs."
SPT_MEX_dock_industry_2:0 "Astilleros de México"
SPT_MEX_dock_industry_2_desc:0 "Mexico's shipbuilding industry has been transformed. New dockyards are opening along both coasts, giving the Armada Mexicana the capacity to build a serious modern fleet."
SPT_MEX_industry_capstone:0 "México Industrial"
SPT_MEX_industry_capstone_desc:0 "Years of investment, reform and development have transformed Mexico from a coup-disrupted agrarian economy into a modern industrial state. The foundations are in place — now we build."
SPT_MEX_industry_5:0 "Plan de Convergencia Industrial"
SPT_MEX_industry_5_desc:0 "The heartland and countryside investment programs have reached a critical juncture. A coordinated convergence plan will channel the combined output of both programs into a unified national industrialization effort — the results will take time to materialize, but they will be transformative."
SPT_MEX_industry_6:0 "Rural Infrastructure Investment"
SPT_MEX_industry_6_desc:0 "New roads, irrigation networks and rural factories are changing the face of Mexico's countryside. As infrastructure improves, consumer goods become more accessible and construction across the country accelerates."
SPT_MEX_industry_7:0 "Rural Industrialization"
SPT_MEX_industry_7_desc:0 "With the infrastructure in place its time for rural Mexico to be industrialized. Its workshops and small factories are getting integrated into the national production network and arms factories and shipyards are being build at pace across the country."
SPT_MEX_industry_8:0 "Territorial Development"
SPT_MEX_industry_8_desc:0 "Mexico's vast territory has barely been touched by industrial development. A systematic program of territorial development — new settlements, mining operations and agricultural industrialization — is opening up previously untapped land and resources."

SPT_MEX_good_neighbour_policy:0 "The Good Neighbour"
SPT_MEX_good_neighbour_policy_desc:0 "Roosevelt's Good Neighbour Policy promised non-intervention in Latin American affairs. With Cedillo's conservative government in place and the oil dispute on the table, Washington is willing to engage. A formal commitment to Pan-American solidarity will open doors across the hemisphere."
SPT_MEX_resource_rights_negotiations:0 "Resource Rights Negotiations"
SPT_MEX_resource_rights_negotiations_desc:0 "Foreign oil companies hold resource rights across Mexico's most productive states. Cárdenas's nationalization may have been reversed, but the question of who owns what beneath Mexican soil remains unresolved. A negotiated settlement will cost us — politically and financially — but it is a price we must pay."
SPT_MEX_pan_american_relations:0 "Pan-American Relations"
SPT_MEX_pan_american_relations_desc:0 "Mexico has the opportunity to position itself as a leader in Pan-American diplomacy. Closer ties with our neighbours will build regional goodwill, attract immigration and strengthen Mexico's standing on the world stage — but the window for action is narrow."
SPT_MEX_commonwealth_cooperation:0 "Commonwealth Military Cooperation"
SPT_MEX_commonwealth_cooperation_desc:0 "The British Commonwealth represents a vast network of military expertise, equipment and training doctrine. Mexico's armed forces stand to gain considerably from a formal cooperation agreement — the depth of that partnership will depend on how close our relationship with London already is."
SPT_MEX_us_cooperation:0 "American Industrial Cooperation"
SPT_MEX_us_cooperation_desc:0 "The United States is the industrial giant of the western hemisphere. A formal cooperation agreement with Washington will give Mexico access to American production techniques, research and license agreements — the depth of that partnership will depend on how close our relationship with Washington already is."
SPT_MEX_mexico_brazil_treaty:0 "The Mexico-Brazil Treaty"
SPT_MEX_mexico_brazil_treaty_desc:0 "Mexico and Brazil are the two largest nations in Latin America. A formal bilateral trade agreement between our two countries will reduce trade barriers, establish preferential tariffs and lay the groundwork for a broader Pan-American economic community."
SPT_MEX_join_the_allies:0 "Join the Allies"
SPT_MEX_join_the_allies_desc:0 "The time for neutrality is over. Mexico will stand with the democratic powers against the Axis threat — not out of ideology, but out of hard-nosed pragmatism and the bonds forged through oil, trade and mutual interest. The Allies need Mexico's resources and manpower, Mexico needs Allied protection and investment."
SPT_MEX_usa_training_program:0 "American Training Program"
SPT_MEX_usa_training_program_desc:0 "American military advisors will embed with Mexican army and navy units, standardizing doctrine, accelerating training and producing a generation of Mexican officers experienced in Allied combined arms warfare."
SPT_MEX_american_trade_deal:0 "Pan-American Trade Deal"
SPT_MEX_american_trade_deal_desc:0 "The bilateral trade agreement with Brazil has proven the concept. Now we will expand it — bringing the United States and Canada into a multilateral Pan-American trade framework that will reduce barriers, establish preferential tariffs and bind the economies of the western hemisphere together."
SPT_MEX_joint_war_planning:0 "Plan de Guerra Conjunto"
SPT_MEX_joint_war_planning_desc:0 "Mexico is now fully committed to the Allied cause. American industrial methods, Commonwealth training doctrine and joint operational planning will be brought together into a unified war planning framework — transforming the Fuerzas Armadas de México into a modern Allied fighting force ready for the demands of global war."
SPT_MEX_american_tech_sharing:0 "Pan-American Research Pact"
SPT_MEX_american_tech_sharing_desc:0 "The Pan-American trade network has matured into something deeper. Mexican, American, Canadian and Brazilian scientists and engineers will now share research findings, technical specifications and industrial innovations freely — what one nation discovers, all four will benefit from."

SPT_MEX_military_reform:0 "Reforma Militar"
SPT_MEX_military_reform_desc:0 "The coup has thrown Mexico's armed forces into disarray. Officers are uncertain, loyalties divided and morale shaken across the army, navy and air force. Comprehensive military reforms are needed to rebuild the confidence of our troops and prepare them for the challenges ahead."
SPT_MEX_army_reform:0 "Army Reorganization"
SPT_MEX_army_reform_desc:0 "The Ejército Mexicano must be rebuilt from the ground up. We will purge disloyal officers, restructure the command hierarchy and restore discipline across the ranks — then choose the path that will define Mexico's army for the coming war."
SPT_MEX_navy_reform:0 "Navy Reorganization"
SPT_MEX_navy_reform_desc:0 "The Armada Mexicana was deeply loyal to Cárdenas. Rebuilding its chain of command, restoring operational effectiveness and choosing a clear strategic doctrine will determine whether Mexico's navy is a coastal defence force or a serious blue-water presence."
SPT_MEX_air_reform:0 "Air Force Reorganization"
SPT_MEX_air_reform_desc:0 "Mexico's small air force must be reorganized and re-equipped. New pilots must be trained, new doctrines established and a strategic direction chosen — will the Fuerza Aérea Mexicana specialize in air superiority, ground support or strategic bombardment?"
SPT_MEX_armor:0 "Study of Modern Warfare"
SPT_MEX_armor_desc:0 "The age of the tank has arrived. Before Mexico can field armored forces, we must first study foreign doctrine and acquire the technical knowledge needed to build and operate modern armored vehicles. American investment and the facilities at Monterrey will be the foundation of our armored ambitions."
SPT_MEX_armor_2:0 "Armored Vehicle Production"
SPT_MEX_armor_2_desc:0 "With the technical knowledge secured, we can begin actual production. Mexico's factories are retooled and foreign machinery imported to begin producing armored vehicles for our armored corps."
SPT_MEX_armor_3:0 "Doctrina Blindada"
SPT_MEX_armor_3_desc:0 "Armor without doctrine is just expensive metal. Mexico's armored commanders will study the great armored campaigns of the age — learning to combine tanks, mechanized infantry and coordinated air support into a unified strike force capable of breaking any defensive line."
SPT_MEX_mass_infantry:0 "Infantry Doctrine"
SPT_MEX_mass_infantry_desc:0 "Mexico has manpower to spare. We will build our army around mass infantry formations — well-organized, resilient and capable of holding the line against any enemy. Every man a soldier, every soldier a patriot."
SPT_MEX_mass_infantry_2:0 "Field Logistics"
SPT_MEX_mass_infantry_2_desc:0 "An army marches on its stomach. Efficient field logistics will keep our infantry supplied and fighting even under sustained pressure — roads, supply depots and standardized equipment will make Mexico's mass infantry force as persistent as it is numerous."
SPT_MEX_inf_sf_1:0 "Soldados de la Patria"
SPT_MEX_inf_sf_1_desc:0 "The Mexican soldier is tough, resilient and loyal. Whether marching in massed infantry columns or operating as elite light infantry in the jungle, the soldiers of the Ejército Mexicano are the backbone of Cedillo's military. Combined training brings the infantry and special forces traditions together into a unified fighting doctrine."
SPT_MEX_special_forces:0 "Fuerzas Especiales"
SPT_MEX_special_forces_desc:0 "Mexico's rugged terrain — jungle, mountain, desert — demands elite troops capable of operating in conditions that would break conventional forces. We will invest in the training and equipment of special operations units that can strike where the enemy least expects."
SPT_MEX_special_forces_2:0 "Infiltration Operations"
SPT_MEX_special_forces_2_desc:0 "Our special forces will be trained in infiltration and deep penetration operations, living off the land and striking deep behind enemy lines. The doctrine they master — rangers, mountaineers or paratroopers — will define Mexico's elite warfare tradition."
SPT_MEX_sf_amph_1:0 "Infantería de Marina"
SPT_MEX_sf_amph_1_desc:0 "Where the jungle meets the sea, Mexico's finest soldiers become marines. The special forces and amphibious traditions merge to create a marine infantry force capable of striking from the sea and disappearing into the jungle — the most feared troops Mexico has ever fielded."
SPT_MEX_navy_1:0 "Naval Modernization"
SPT_MEX_navy_1_desc:0 "The Armada Mexicana will be modernized from the keel up. New submarines and destroyers will form the backbone of Mexico's naval presence in the Gulf of Mexico and Pacific — we must choose whether we build around surface vessels or the submarine arm."
SPT_MEX_navy_2:0 "Dockyard Expansion"
SPT_MEX_navy_2_desc:0 "Mexico's existing dockyards cannot support the fleet we need. New construction facilities along both coasts will give the Armada the capacity to build, repair and maintain the ships of a modern navy."
SPT_MEX_navy_3:0 "Naval Specialization"
SPT_MEX_navy_3_desc:0 "Our officers have studied the doctrines of the great naval powers. Now we must choose our path — a submarine force to threaten enemy shipping from beneath the waves, or a destroyer flotilla to protect Allied convoys across the Gulf and Caribbean."
SPT_MEX_navy_4:0 "Fuerza Submarina"
SPT_MEX_navy_4_desc:0 "A dedicated submarine force will give Mexico the ability to strike at enemy supply lines from beneath the waves. Silent and deadly, our submarines will lurk in the Gulf and Caribbean, threatening any power that challenges our maritime interests."
SPT_MEX_navy_5:0 "Flotilla de Escolta"
SPT_MEX_navy_5_desc:0 "A dedicated convoy escort flotilla will protect Allied shipping in the Gulf of Mexico and Caribbean. Mexico's destroyers will hunt submarines and screen convoys, making a vital contribution to the Allied war effort."
SPT_MEX_amphibious:0 "Amphibious Capability"
SPT_MEX_amphibious_desc:0 "Mexico's long coastlines and island geography make amphibious operations a natural focus for our naval development. Investment in transport ships and marine infantry will give Mexico the ability to project power across the sea."
SPT_MEX_amphibious_2:0 "Marine Assault Doctrine"
SPT_MEX_amphibious_2_desc:0 "A dedicated marine assault force will be trained to storm fortified beaches and operate deep behind enemy lines. One of our generals will be designated to lead this new amphibious corps — gaining the skills and experience needed to command Mexico's most daring operations."
SPT_MEX_fighter_doctrine:0 "Fighter Doctrine" 
SPT_MEX_fighter_doctrine_desc:0 "Air superiority is the foundation of modern warfare. Mexico will build a fighter force capable of denying the enemy the skies over Mexican territory and Allied operations — investing in the guns, engines and tactics that make a great fighter pilot."
SPT_MEX_fighter_doctrine_2:0 "Pilot Training Schools"
SPT_MEX_fighter_doctrine_2_desc:0 "New pilot training schools will produce a generation of skilled fighter pilots who will carry Mexico's colors into battle. The Fuerza Aérea Mexicana will be faster, more agile and more lethal than anything it has faced before."
SPT_MEX_air_superiority_support:0 "Control del Aire"
SPT_MEX_air_superiority_support_desc:0 "The lessons of the fighter and tactical bomber pilots are combined into a unified doctrine of air control — maintaining superiority over the battlefield while providing close support to ground forces below. Mexico's air force learns to do both at once."
SPT_MEX_tactical_bomber:0 "Tactical Bomber Doctrine" 
SPT_MEX_tactical_bomber_desc:0 "Close air support will be the cornerstone of Mexico's air contribution to the Allied war effort. Investing in bomb technology, engines and battlefield support doctrine will make the Fuerza Aérea a decisive factor on every front."
SPT_MEX_tactical_bomber_2:0 "Close Air Support"
SPT_MEX_tactical_bomber_2_desc:0 "Our tactical bombers will be trained to work in close coordination with ground forces — striking enemy concentrations, breaking defensive lines and providing real-time support during offensive and defensive operations."
SPT_MEX_strategic_bomber:0 "Strategic Bomber Program"
SPT_MEX_strategic_bomber_desc:0 "Long-range strategic bombers will give Mexico the ability to strike deep into enemy territory, targeting industry, infrastructure and supply lines far beyond the front line. A small but capable strategic bomber force can have an outsized impact on the outcome of the war."
SPT_MEX_strategic_bomber_2:0 "Long Range Aviation"
SPT_MEX_strategic_bomber_2_desc:0 "Extended-range fuel systems, navigation training and new airframe designs will allow our bombers to strike targets across the vast Pacific theater — reaching objectives that would be beyond the range of conventional aircraft."
SPT_MEX_strategic_bomber_3:0 "Precision Strategic Bombing"
SPT_MEX_strategic_bomber_3_desc:0 "Precision bombing techniques, night operations training and reduced radar visibility will make every sortie count — maximizing damage to enemy infrastructure while minimizing losses to interception. Mexico's strategic bombers will strike hard, strike accurately and come home."

## MODIFIERS

SPT_MEX_fuerzas_armadas_dynamic_modifier:0 "Fuerzas Armadas de México"
SPT_MEX_fuerzas_armadas_dynamic_modifier_desc:0 "Founded in 1821 following the War of Independence, the Mexican Armed Forces have weathered revolution, civil war and political upheaval. Under Cedillo's command, their future will be shaped by the choices made in the years ahead."
SPT_MEX_industria_dynamic_modifier:0 "Industria Mexicana"
SPT_MEX_industria_dynamic_modifier_desc:0 "Born from the reforms of the Revolution, Mexico's economy has long struggled to escape the shadow of foreign capital and agricultural dependency. Following Cedillo's coup, Mexico's economy will have to modernize to compete on the world stage."
SPT_MEX_good_neighbour_modifier:0 "Good Neighbour Policy"
SPT_MEX_resource_rights_snub:0 "Resource Rights Dispute"

