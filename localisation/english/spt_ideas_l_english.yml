SPT_MEX_bad_caudillo:0 "The Wounds of Revolution"
SPT_MEX_bad_caudillo_desc:0 "General Cedillo's coup has plunged Mexico into crisis. Cardenista loyalists wage a bitter guerrilla war in the mountains and jungles while labour unions and leftist organizations resist the new order in the cities. Thousands have fled the country or gone underground. Until a new constitutional order is established, Mexico bleeds."
SPT_MEX_the_troubles:0 "Los Problemas"
SPT_MEX_the_troubles_desc:0 "Mexico is consumed by religious conflicts once again. If we want to fix this, we need to work towards a pluralist democracy."
SPT_MEX_true_mexican_experience:0 "§GThe True Mexican Experience§!"
SPT_MEX_cacique_network:0 "The Cacique Network"
SPT_MEX_cacique_network_desc:0 "Power in Mexico is decentralized, held by regional strongmen loyal to Cedillo personally. The central government sacrifices some authority in exchange for local stability and manpower."
SPT_MEX_agrarismo:0 "Agrarismo"
SPT_MEX_agrarismo_desc:0 "Land distributed to peasants under cacique patronage has bound the rural population to the new order. Mexico's countryside is loyal, populated, and productive — but the peasants stay on the land rather than moving to the cities."
SPT_MEX_oil_income:0 "Foreign Oil Revenue"
SPT_MEX_oil_income_desc:0 "Foreign oil companies have returned to Mexico. Their investment and the government's share of revenues flow into the national economy, funding construction and industry."
SPT_MEX_tank_production_programme:0 "Programa de Producción Blindada"
SPT_MEX_tank_production_programme_desc:0 "Mexico's armored vehicle production programme is underway. Factories are retooled and foreign machinery imported, reducing the cost of producing tanks and mechanized vehicles."
SPT_MEX_industrialization_plan:0 "Plan de Industrialización Nacional"
SPT_MEX_industrialization_plan_desc:0 "A coordinated national industrialization plan is underway, transforming the country's economic base from a coup-disrupted agrarian economy into a modern industrial state."
SPT_MEX_rural_development_plan:0 "Rural Development Plan"
SPT_MEX_rural_development_plan_desc:0 "Investment in rural infrastructure is transforming the Mexican countryside. New roads, irrigation networks and rural factories are changing the face of the nation."
SPT_MEX_military_industrial_base:0 "Military-Industrial Investments"
SPT_MEX_military_industrial_base_desc:0 "The combined investment in heartland and countryside industries has created the conditions for a serious military-industrial programme. Arms factories and shipyards can now be constructed at pace."
SPT_MEX_land_development_programme:0 "Programa de Desarrollo Territorial"
SPT_MEX_land_development_programme_desc:0 "The systematic development of Mexico's vast countryside is underway. New settlements, mining operations and agricultural projects are opening up previously untapped land for industrial and economic use."
SPT_MEX_mass_weapons_production:0 "Producción Masiva de Armamento"
SPT_MEX_mass_weapons_production_desc:0 "Mexico's factories have been retooled for mass production of small arms and support equipment. Standardized production lines reduce costs and keep the army supplied."
SPT_MEX_commonwealth_air_training_plan:0 "Commonwealth Air Training Plan"
SPT_MEX_commonwealth_air_training_plan_desc:0 "Mexico has joined the Commonwealth Air Training Plan, sending pilots to train alongside RAF and Commonwealth airmen. The programme produces skilled aviators at an accelerated rate."
SPT_MEX_instituto_tecnologico:0 "Instituto Tecnológico Nacional"
SPT_MEX_instituto_tecnologico_desc:0 "A network of technical institutes is training a new generation of Mexican engineers and scientists to lead Mexico into the future."
SPT_MEX_good_neighbour_recognition:0 "Good Neighbour Policy"
SPT_MEX_good_neighbour_recognition_desc:0 "Mexico's commitment to the Good Neighbour Policy has been recognized by its American partners. A period of diplomatic goodwill is generating political capital and stabilizing the regime."
SPT_MEX_pan_american_recognition:0 "Pan-American Solidarity"
SPT_MEX_pan_american_recognition_desc:0 "Mexico has established itself as a key partner in Pan-American diplomacy. The prestige of regional leadership is attracting immigrants, building war support and generating political capital."
SPT_MEX_resource_compensation_1:0 "Resource Compensation Payments"
SPT_MEX_resource_compensation_1_desc:0 "Mexico is compensating foreign oil companies for the return of resource rights. The payments are a strain on the economy but a necessary price for diplomatic goodwill."
SPT_MEX_resource_compensation_2:0 "Resource Rights Windfall"
SPT_MEX_resource_compensation_2_desc:0 "Compensation payments from Mexico are flowing in. The settlement of the resource rights dispute is a welcome boost to our industry."
SPT_MEX_resource_compensation_3:0 "Resource Compensation — Unaligned"
SPT_MEX_resource_compensation_3_desc:0 "Without an oil deal in place, Mexico is paying full compensation to both American and British interests simultaneously. The economic strain is significant — goods are scarce and construction has slowed."
SPT_MEX_commonwealth_cooperation_full:0 "Commonwealth Military Cooperation"
SPT_MEX_commonwealth_cooperation_full_desc:0 "A full military cooperation agreement with the British Commonwealth is accelerating the development of Mexico's armed forces. British advisors, training programs and access to Commonwealth equipment are transforming the Fuerzas Armadas de México."
SPT_MEX_commonwealth_cooperation_partial:0 "Commonwealth Military Liaison"
SPT_MEX_commonwealth_cooperation_partial_desc:0 "A limited military liaison agreement with the British Commonwealth provides Mexico with access to some Commonwealth training programs and equipment licenses, though the full benefits require a deeper partnership."
SPT_MEX_usa_cooperation_full:0 "American Military-Industrial Cooperation"
SPT_MEX_usa_cooperation_full_desc:0 "A full military-industrial cooperation agreement with the United States is transforming Mexico's production capabilities. American industrial methods, research sharing and license agreements are modernizing the Mexican industry."
SPT_MEX_usa_cooperation_partial:0 "American Industrial Liaison"
SPT_MEX_usa_cooperation_partial_desc:0 "A limited industrial liaison agreement with the United States provides Mexico with access to some American production techniques and license agreements, though the full benefits require a deeper partnership."
SPT_MEX_mex_bra_trade_1:0 "Acuerdo Comercial México-Brasil"
SPT_MEX_mex_bra_trade_1_desc:0 "A bilateral trade agreement between Mexico and Brazil has established preferential tariffs and reduced trade barriers between the two largest Latin American nations."
SPT_MEX_mex_bra_trade_2:0 "Acuerdo Comercial Brasil-México"
SPT_MEX_mex_bra_trade_2_desc:0 "A bilateral trade agreement between Mexico and Brazil has established preferential tariffs and reduced trade barriers between the two largest Latin American nations."
SPT_MEX_pan_american_trade_mex:0 "Pan-American Trade Pact"
SPT_MEX_pan_american_trade_mex_desc:0 "Mexico is a founding member of the Pan-American Trade Pact, a multilateral trade agreement between Mexico, the United States, Canada and Brazil establishing preferential tariffs and reduced trade costs across the American hemisphere."
SPT_MEX_pan_american_trade_usa:0 "Pan-American Trade Pact"
SPT_MEX_pan_american_trade_usa_desc:0 "The United States is a founding member of the Pan-American Trade Pact, a multilateral trade agreement between the United States, Mexico, Canada and Brazil establishing preferential tariffs and reduced trade costs across the American hemisphere."
SPT_MEX_pan_american_trade_can:0 "Pan-American Trade Pact"
SPT_MEX_pan_american_trade_can_desc:0 "Canada is a founding member of the Pan-American Trade Pact, a multilateral trade agreement between Canada, Mexico, the United States and Brazil establishing preferential tariffs and reduced trade costs across the American hemisphere."
SPT_MEX_pan_american_trade_bra:0 "Pan-American Trade Pact"
SPT_MEX_pan_american_trade_bra_desc:0 "Brazil is a founding member of the Pan-American Trade Pact, a multilateral trade agreement between Brazil, Mexico, the United States and Canada establishing preferential tariffs and reduced trade costs across the American hemisphere."
SPT_MEX_joint_training_program:0 "Programa de Entrenamiento Conjunto"
SPT_MEX_joint_training_program_desc:0 "A joint military training programme between Mexico and the United States is standardizing doctrine, accelerating unit training and producing a generation of officers experienced in Allied combined arms warfare."
SPT_MEX_joint_war_planning_usa:0 "Plan de Guerra Conjunto"
SPT_MEX_joint_war_planning_usa_desc:0 "Mexico is fully integrated into the Allied war planning apparatus. American industrial methods, Commonwealth training programs and joint operational planning have transformed the Fuerzas Armadas de México into a modern Allied fighting force."
SPT_MEX_joint_war_planning_uk:0 "Plan de Guerra Conjunto"
SPT_MEX_joint_war_planning_uk_desc:0 "Mexico is fully integrated into the Allied war planning apparatus. American industrial methods, Commonwealth training programs and joint operational planning have transformed the Fuerzas Armadas de México into a modern Allied fighting force."

